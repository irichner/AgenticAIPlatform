name: CI — MCP Servers

on:
  push:
    branches: [main]
    paths:
      - 'mcp-servers/**'
  pull_request:
    paths:
      - 'mcp-servers/**'

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint (${{ matrix.server }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: [filesystem, gdrive, postgres, spm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check mcp-servers/${{ matrix.server }}/

  build:
    name: Docker build & push (${{ matrix.server }})
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        server: [filesystem, gdrive, postgres, spm]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./mcp-servers/${{ matrix.server }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/lanara-mcp-${{ matrix.server }}:main
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/lanara-mcp-${{ matrix.server }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
