version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lanara-postgres
    environment:
      POSTGRES_DB: lanara
      POSTGRES_USER: lanara
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lanara_supersecret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanara"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lanara-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:rocm
    container_name: lanara-ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "991"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_FLASH_ATTENTION=1
      - HSA_OVERRIDE_GFX_VERSION=8.0.3
      - ROCR_VISIBLE_DEVICES=0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanara-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://lanara:${POSTGRES_PASSWORD:-lanara_supersecret}@postgres:5432/lanara
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}
      - MCP_INGEST_SECRET=${MCP_INGEST_SECRET}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENV=development
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
      - GOOGLE_INTEGRATION_REDIRECT_URI=http://localhost:3000/api/integrations/google/callback
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@lanara.app}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp-postgres:
    build:
      context: ./mcp-servers/postgres
      dockerfile: Dockerfile
    container_name: lanara-mcp-postgres
    environment:
      - DATABASE_URL=postgresql://lanara:${POSTGRES_PASSWORD:-lanara_supersecret}@postgres:5432/lanara
      - HOST=0.0.0.0
      - PORT=8012
    ports:
      - "8012:8012"
    depends_on:
      postgres:
        condition: service_healthy

  mcp-slack:
    build:
      context: ./mcp-servers/slack
      dockerfile: Dockerfile
    container_name: lanara-mcp-slack
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - BACKEND_URL=http://backend:8000
      - DEFAULT_ORG_ID=${DEFAULT_ORG_ID:-}
    ports:
      - "8026:8026"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lanara-frontend
    environment:
      - BACKEND_URL=backend:8000
    depends_on:
      - backend
    labels:
      - "coolify.managed=true"
      - "coolify.port=3000"

volumes:
  postgres_data:
  redis_data:
  ollama_data:
